<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Brazim - מחירון</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&family=Frank+Ruhl+Libre:wght@500;700&display=swap" rel="stylesheet">
<style>
  @page { size: A4 portrait; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 210mm;
    height: 297mm;
    font-family: 'Heebo', sans-serif;
    color: #1a2540;
    background: #ffffff;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  :root {
    --brazim-blue: #0056b3;
    --brazim-blue-dark: #003d80;
    --brazim-blue-light: #4a99e5;
    --brazim-orange: #e8820c;
    --whatsapp: #25D366;
    --ink: #1a2540;
    --muted: #6b7280;
    --line: #e5e7eb;
    --bg-soft: #f8fafc;
  }

  .page {
    width: 210mm;
    height: 297mm;
    padding: 12mm 14mm 10mm;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 5mm;
  }

  .bsd {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 12pt;
    font-weight: 500;
    color: var(--muted);
  }

  .logo-img {
    height: 14mm;
    width: auto;
    object-fit: contain;
  }

  .water-strip {
    height: 12mm;
    margin: 0 -14mm 6mm;
    
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  .hero {
    width: 100%;
    height: 148mm;
    background: var(--bg-soft);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 2px 8px rgba(0, 86, 179, 0.06), 0 1px 3px rgba(0,0,0,0.04);
    border: 1px solid rgba(0, 86, 179, 0.08);
  }

  .hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .hero-watermark {
    position: absolute;
    bottom: 5mm;
    left: 5mm;
    font-size: 9pt;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.9);
    letter-spacing: 0.5px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    pointer-events: none;
  }
  .hero-watermark .blue { color: rgba(180, 220, 255, 0.95); }

  .price-section {
    margin-top: 6mm;
  }

  .price-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 3mm;
  }

  .price-cell {
    padding: 4mm 2mm;
    text-align: center;
    border: 1px solid rgba(0, 86, 179, 0.18);
    border-radius: 8px;
    background: #fff;
  }

  .size-label {
    font-size: 10pt;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 1.5mm;
    letter-spacing: 0.3px;
  }

  .price-value {
    font-size: 19pt;
    font-weight: 800;
    color: var(--brazim-blue-dark);
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .currency {
    font-size: 12pt;
    font-weight: 600;
    color: var(--brazim-blue);
    margin-left: 1px;
  }

  .price-empty {
    color: var(--muted);
    font-size: 14pt;
    font-weight: 400;
  }

  .notes {
    font-size: 9.5pt;
    color: #444;
    line-height: 1.5;
    margin: 4mm 0;
    padding: 3mm 4mm;
    background: var(--bg-soft);
    border-radius: 4px;
    border-right: 2px solid var(--brazim-orange);
  }

  .bottom-bar {
    margin-top: auto;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 6mm;
    align-items: center;
    padding-top: 4mm;
    border-top: 1px solid var(--line);
  }

  .qr-block {
    display: flex;
    align-items: center;
    gap: 3mm;
  }

  .qr-code {
    width: 19mm;
    height: 19mm;
    background: #fff;
    border: 1px solid rgba(0, 86, 179, 0.2);
    padding: 1mm;
    border-radius: 4px;
  }

  .qr-code img {
    width: 100%;
    height: 100%;
    display: block;
  }

  .qr-label {
    font-size: 9pt;
    color: var(--ink);
    line-height: 1.35;
  }
  .qr-label strong {
    display: block;
    font-weight: 700;
    color: var(--brazim-blue);
    font-size: 10.5pt;
    margin-bottom: 0.5mm;
  }

  .contact {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3mm;
  }

  .whatsapp-icon {
    width: 12mm;
    height: 12mm;
    background: var(--whatsapp);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(37, 211, 102, 0.3);
  }

  .whatsapp-icon svg {
    width: 7mm;
    height: 7mm;
    fill: white;
  }

  .contact-info {
    text-align: right;
  }
  .contact-info .label {
    font-size: 8.5pt;
    color: var(--muted);
    margin-bottom: 0.3mm;
  }
  .contact-info .number {
    font-weight: 700;
    color: var(--ink);
    font-size: 13pt;
    letter-spacing: 0.3px;
    direction: ltr;
    display: inline-block;
  }

  .sku {
    text-align: left;
    font-size: 8.5pt;
    color: var(--muted);
    line-height: 1.3;
  }
  .sku strong {
    display: block;
    color: var(--brazim-blue);
    font-size: 11pt;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 0.3mm;
  }
</style>
</head>
<body>
  <div class="page">

    <div class="top-bar">
      <div class="bsd">בס"ד</div>
      <img src="" id="logo_img" alt="Brazim" class="logo-img">
    </div>

    <div class="water-strip"></div>

    <div class="hero">
      <img src="" id="product_img" alt="ארון אמבטיה">
      <div class="hero-watermark"><span>Brazim</span><span class="blue">.co.il</span></div>
    </div>

    <div class="price-section">
      <div class="price-grid">
        <div class="price-cell">
          <div class="size-label">60 ס"מ</div>
          <div class="price-value"><span id="price_60">-</span><span class="currency">₪</span></div>
        </div>
        <div class="price-cell">
          <div class="size-label">80 ס"מ</div>
          <div class="price-value"><span id="price_80">-</span><span class="currency">₪</span></div>
        </div>
        <div class="price-cell">
          <div class="size-label">100 ס"מ</div>
          <div class="price-value"><span id="price_100">-</span><span class="currency">₪</span></div>
        </div>
        <div class="price-cell">
          <div class="size-label">120 ס"מ</div>
          <div class="price-value"><span id="price_120">-</span><span class="currency">₪</span></div>
        </div>
      </div>
    </div>

    <div class="notes">
      <span id="notes_text">-</span>
    </div>

    <div class="bottom-bar">
      <div class="qr-block">
        <div class="qr-code">
          <img src="" id="qr_img" alt="QR">
        </div>
        <div class="qr-label">
          <strong>סרקו</strong>
          לעוד דגמים<br>במחירון המלא
        </div>
      </div>

      <div class="contact">
        <div class="whatsapp-icon">
          <svg viewBox="0 0 24 24"><path d="M17.498 14.382c-.301-.15-1.767-.867-2.04-.966-.273-.101-.473-.15-.673.15-.197.295-.771.964-.944 1.162-.175.195-.349.21-.646.075-.3-.15-1.263-.465-2.403-1.485-.888-.795-1.484-1.77-1.66-2.07-.174-.3-.019-.465.13-.615.136-.135.301-.345.451-.523.146-.181.194-.301.297-.496.1-.21.049-.375-.025-.524-.075-.15-.672-1.62-.922-2.206-.24-.584-.487-.51-.672-.51-.172-.015-.371-.015-.571-.015-.2 0-.523.074-.797.359-.273.3-1.045 1.02-1.045 2.475s1.07 2.865 1.219 3.075c.149.195 2.105 3.195 5.1 4.485.714.3 1.27.48 1.704.629.714.227 1.365.195 1.88.121.574-.091 1.767-.721 2.016-1.426.255-.705.255-1.29.18-1.425-.074-.135-.27-.21-.57-.345m-5.446 7.443h-.016c-1.77 0-3.524-.48-5.055-1.38l-.36-.214-3.75.975 1.005-3.645-.239-.375c-.99-1.575-1.516-3.39-1.516-5.26 0-5.445 4.455-9.885 9.942-9.885 2.654 0 5.145 1.035 7.021 2.91 1.875 1.886 2.909 4.376 2.909 7.026-.004 5.444-4.46 9.885-9.935 9.885M20.52 3.449C18.24 1.245 15.24 0 12.045 0 5.463 0 .104 5.334.101 11.893c0 2.096.549 4.14 1.595 5.945L0 24l6.335-1.652c1.746.943 3.71 1.444 5.71 1.447h.006c6.585 0 11.946-5.336 11.949-11.896 0-3.176-1.24-6.165-3.495-8.411"/></svg>
        </div>
        <div class="contact-info">
          <div class="label">לפרטים והזמנות</div>
          <span class="number"><span id="whatsapp_num">-</span></span>
        </div>
      </div>

      <div class="sku">
        <strong><span id="sku_num">-</span></strong>
        מק"ט
      </div>
    </div>
  </div>

<script>
// Get URL parameters
function getParam(name) {
  const params = new URLSearchParams(window.location.search);
  return params.get(name) || '';
}

// Format number with commas
function formatNum(num) {
  if (!num || isNaN(num)) return '-';
  return parseInt(num).toLocaleString('en-US');
}

// Set image src
function setImg(id, url) {
  const el = document.getElementById(id);
  if (el && url) el.src = decodeURIComponent(url);
}

// Set text content
function setText(id, text) {
  const el = document.getElementById(id);
  if (el) el.textContent = text || '-';
}

// Set background image
function setBg(selector, url) {
  const el = document.querySelector(selector);
  if (el && url) el.style.backgroundImage = `url('${decodeURIComponent(url)}')`;
}

// Apply all parameters when page loads
window.addEventListener('DOMContentLoaded', function() {
  // Images
  setImg('logo_img', getParam('logo'));
  setImg('product_img', getParam('product'));
  setBg('.water-strip', getParam('water'));
  
  // QR code - generate from album URL
  const albumUrl = getParam('album');
  if (albumUrl) {
    const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(decodeURIComponent(albumUrl)) + '&margin=0';
    setImg('qr_img', encodeURIComponent(qrUrl));
  }
  
  // Prices (with comma formatting)
  setText('price_60', formatNum(getParam('p60')));
  setText('price_80', formatNum(getParam('p80')));
  setText('price_100', formatNum(getParam('p100')));
  setText('price_120', formatNum(getParam('p120')));
  
  // Text fields
  setText('notes_text', decodeURIComponent(getParam('notes') || ''));
  setText('whatsapp_num', getParam('whatsapp'));
  setText('sku_num', getParam('sku'));
});
</script>
</body>
</html>
